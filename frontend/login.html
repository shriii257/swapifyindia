<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – SwapifyIndia</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex items-center justify-center p-6">
<div class="hero-bg" style="position:fixed;inset:0;pointer-events:none"></div>
<div class="hero-grid" style="position:fixed;inset:0;pointer-events:none"></div>

<div class="relative z-10 w-full max-w-md animate-fade-up">
  <div class="text-center mb-8">
    <a href="index.html" class="inline-flex items-center gap-2 mb-6">
      <div class="w-9 h-9 rounded-xl bg-[#ff4d1c] flex items-center justify-center font-black text-sm">S</div>
      <span class="font-black text-xl" style="font-family:'Syne',sans-serif">SwapifyIndia</span>
    </a>
    <h1 class="text-3xl font-black" style="font-family:'Syne',sans-serif">Welcome back</h1>
    <p class="text-gray-400 mt-2 text-sm">Sign in to buy or sell tickets</p>
  </div>

  <div class="auth-card rounded-2xl p-8">
    <div id="error-msg" class="hidden mb-5 p-4 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400 text-sm"></div>

    <div class="space-y-5">
      <div>
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" required/>
      </div>
      <div>
        <label class="form-label">Password</label>
        <div class="relative">
          <input type="password" id="password" class="form-input pr-12" placeholder="Your password" required/>
          <button type="button" onclick="togglePwd('password','eye-pw')" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 text-sm" id="eye-pw">👁</button>
        </div>
      </div>
      <button onclick="doLogin()" id="login-btn" class="btn-primary w-full py-3.5 rounded-xl font-bold text-base">
        Sign In
      </button>
    </div>

    <div class="mt-6 pt-6 border-t border-white/10 text-center">
      <p class="text-gray-400 text-sm">Don't have an account? <a href="signup.html" class="text-[#ff4d1c] font-semibold hover:text-orange-400 transition-colors">Sign up free</a></p>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    if (isLoggedIn()) window.location.href = 'dashboard.html';
    document.getElementById('password').addEventListener('keypress', e => { if(e.key==='Enter') doLogin(); });
  });

  function togglePwd(inputId, btnId) {
    const inp = document.getElementById(inputId);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errDiv = document.getElementById('error-msg');
    const btn = document.getElementById('login-btn');

    if (!email || !password) { showErr('Please fill in all fields.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="opacity-70">Signing in...</span>';
    errDiv.classList.add('hidden');

    try {
      const data = await apiCall('/auth/login', 'POST', { email, password });
      localStorage.setItem('si_token', data.token);
      localStorage.setItem('si_user', JSON.stringify(data.user));
      showToast('Welcome back, ' + data.user.name + '!', 'success');
      const redirect = getParam('redirect');
      setTimeout(() => window.location.href = redirect || 'dashboard.html', 700);
    } catch(e) {
      showErr(e.message || 'Invalid email or password.');
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
    }
  }

  function showErr(msg) {
    const errDiv = document.getElementById('error-msg');
    errDiv.textContent = msg;
    errDiv.classList.remove('hidden');
  }
</script>
</body>
</html>
